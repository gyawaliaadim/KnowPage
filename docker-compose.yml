services:
  frontend:
    env_file:
      - ./frontend/.env
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
    depends_on:
      - backend
      - ml
    networks:
      - app-network
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.app
    ports:
      - "8000:8000"
    environment:
      - PYTHONPATH=/app
    networks:
      - app-network
    volumes:
      - ./backend:/app

  ml:
    depends_on:
      - ollama
    build:
      context: ./backend
      dockerfile: Dockerfile.ml
    ports:
      - "8001:8001"
    environment:
      - PYTHONPATH=/app
    networks:
      - app-network
    volumes:
      - ./backend:/app
      - ml_models:/root/.cache/huggingface

  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  frontend_node_modules:
  ml_models:
  ollama_models: